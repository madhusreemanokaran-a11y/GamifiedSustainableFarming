<!DOCTYPE html>
<html>
<head>
    <title>Farmer Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #e8f5e9;
            text-align: center;
            padding-top: 50px;
        }

        .card {
            background: white;
            width: 500px;
            margin: auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 15px gray;
        }

        h1 {
            color: green;
        }

        .item {
            font-size: 20px;
            margin: 15px;
        }

        .badge {
            font-size: 40px;
        }
    </style>

</head>

<body>

<div class="card">

    <h1>👨‍🌾 Farmer Dashboard</h1>

    <div class="item">
        Name: Demo Farmer
    </div>

    <div class="item">
        Location: Tamil Nadu
    </div>

    <div class="item">
        🏆 Points: 150
    </div>

    <div class="item">
        Level: Green Farmer 🌱
    </div>

    <div class="badge">
        🥇 Eco Warrior
    </div>

</div>

</body>
</html>
